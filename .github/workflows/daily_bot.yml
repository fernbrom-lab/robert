name: 丙級營造標案網頁自動化生成

on:
  schedule:
    - cron: '0 5 * * *' # 台灣時間每天下午 13:00 自動執行
  workflow_dispatch: # 允許手動點擊執行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. 複製專案程式碼
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 2. 初始化 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 4. 執行 Python 生成網頁 (透過後台環境變數完美護航網址)
      env:
        TARGET_API_URL: "https://ronny.tw"
      run: |
        python main_crawler.py

    - name: 5. 終極防衝突強制將網頁推回專案
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add -A
        git commit --allow-empty -m "🤖 自動更新：雙欄版網頁情報站 (最後更新: $(date +'%Y-%m-%d %H:%M:%S'))"
        git pull --rebase origin main
        git push origin main --force
