name: 丙級營造標案網頁自動化生成

on:
  schedule:
    - cron: '0 5 * * *' # 台灣時間每天下午 13:00 自動執行
  workflow_dispatch: # 允許手動點擊執行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 複製專案程式碼
      uses: actions/checkout@v4

    - name: 2. 初始化 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 4. 執行 Python 生成網頁
      run: |
        python  1run_clean_crawler.py

    - name: 5. 上傳網頁成果 (不使用 Git Commit)
      uses: actions/upload-artifact@v4
      with:
        name: website-dist
        path: dist/
