name: 丙級營造標案網頁自動化生成

on:
  schedule:
    - cron: '0 5 * * *' # 台灣時間每天下午 13:00 自動執行
  workflow_dispatch: # 允許手動點擊執行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予自動推網頁回倉庫的寫入權限

    steps:
    - name: 1. 複製專案程式碼
      uses: actions/checkout@v4

    - name: 2. 初始化 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安装必要套件
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 4. 執行 Python 生成網頁
      run: |
        python crawler_to_html.py

    - name: 5. 將最新生成的網頁推回 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git status
        git add dist/ history_data.json
        git commit -m "🤖 自動更新：網頁版標案日報" || exit 0
        git push
