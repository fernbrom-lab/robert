name: 查詢政府標案 (Playwright)

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  query-tenders:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安裝依賴
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium  # 安裝 Chromium 瀏覽器
      
      - name: 執行標案查詢
        run: python twinkle_tender.py
      
      - uses: actions/upload-artifact@v4
        with:
          name: tender-results
          path: |
            tender_results.json
            tender_report.html
