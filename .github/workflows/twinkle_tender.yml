name: 查詢 Twinkle Hub 標案- name: 安裝依賴 
run: |
    pip install requests beautifulsoup4
   

on:
  schedule:
    - cron: '0 9 * * *'  # 每天上午 9 點
  workflow_dispatch:
jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: 執行查詢
        env:
          TWINKLE_API_KEY: ${{ secrets.TWINKLE_API_KEY }}
        run: python twinkle_tender.py
      - uses: actions/upload-artifact@v4
        with:
          name: tender-results
          path: tender_results.json
