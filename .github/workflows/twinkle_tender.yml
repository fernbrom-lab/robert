name: 查詢政府標案

on:
  schedule:
    - cron: '0 9 * * *'  # 每天上午 9 點執行
  workflow_dispatch:      # 允許手動觸發

jobs:
  query-tenders:
    runs-on: ubuntu-latest
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4
      
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安裝依賴
        run: |
          pip install requests
          pip install beautifulsoup4
      
      - name: 執行標案查詢
        env:
          TWINKLE_API_KEY: ${{ secrets.TWINKLE_API_KEY }}  # 保留以備不時之需
        run: python twinkle_tender.py
      
      - name: 儲存查詢結果
        uses: actions/upload-artifact@v4
        with:
          name: tender-results
          path: |
            tender_results.json
            tender_report.html
