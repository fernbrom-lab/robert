name: Test PCC-API

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允許手動觸發

jobs:
  test-api:
    runs-on: ubuntu-latest
    
    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v3
    
    - name: 設定 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 安裝依賴
      run: |
        pip install requests
    
    - name: 執行 API 測試
      run: |
        python testapi.py
    
    - name: 保存測試結果
      uses: actions/upload-artifact@v3
      with:
        name: api-test-results
        path: |
          test_results.json
          test_output.txt
