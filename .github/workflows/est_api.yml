name: Test PCC-API

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest
    
    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4  # 也順便升級到 v4
    
    - name: 設定 Python
      uses: actions/setup-python@v5  # 升級到 v5
      with:
        python-version: '3.10'
    
    - name: 安裝依賴
      run: |
        pip install requests
    
    - name: 執行 API 測試
      run: |
        python testapi.py
    
    - name: 保存測試結果
      uses: actions/upload-artifact@v4  # 關鍵修正：v3 → v4
      with:
        name: api-test-results
        path: |
          test_results.json
          test_output.txt
